name: Build Prebuilt Libraries

# Manually triggered — run once per platform whenever lib versions change.
# Compiles all static libraries and uploads them as a GitHub Release asset.
# CI workflows then download these instead of compiling from scratch.
#
# How to use:
#   1. Go to Actions -> Build Prebuilt Libraries -> Run workflow
#   2. Select the platform you want to build
#   3. Wait ~2-3 hours for libs to compile
#   4. The tarball is uploaded to the 'prebuilt-libs' GitHub Release automatically
#   5. Future CI runs download the tarball in ~30 seconds instead of compiling

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build libs for'
        required: true
        type: choice
        options:
          - linux-x64
          - linux-aarch64
          - macos-x64
          - macos-arm64

permissions:
  contents: write   # needed to upload release assets

env:
  JOBS: 4

# ── Linux x64 ─────────────────────────────────────────────────────────────────
jobs:
  build-linux-x64:
    name: Build libs — Linux x64
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    if: inputs.platform == 'linux-x64'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rubber-duckie-au/DigitalNote-Builder.git

      - name: Download library source archives
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: bash download.sh

      - name: Install system packages
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: |
          sudo apt-get update -qq
          bash update.sh
          sudo apt-get install -y \
            libgmp-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcb1-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrender-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-glx0-dev \
            libxcb-keysyms1-dev \
            libxcb-image0-dev \
            libxcb-shm0-dev \
            libxcb-icccm4-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-util-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev

      - name: Compile static libraries
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: bash compile_libs.sh "-j ${{ env.JOBS }}"

      - name: Package libs tarball
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: |
          tar -czf ${{ github.workspace }}/libs-linux-x64.tar.gz libs/
          echo "Tarball size: $(du -sh ${{ github.workspace }}/libs-linux-x64.tar.gz)"
          sha256sum ${{ github.workspace }}/libs-linux-x64.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-libs
          name: "Prebuilt Static Libraries"
          body: |
            Prebuilt static libraries for DigitalNote CI.
            Built on GitHub-hosted runners — download these in CI instead of compiling from source.
            Each platform tarball extracts to a `libs/` directory.
          files: ${{ github.workspace }}/libs-linux-x64.tar.gz
          token: ${{ secrets.PAT_TOKEN }}

# ── Linux aarch64 ─────────────────────────────────────────────────────────────
  build-linux-aarch64:
    name: Build libs — Linux aarch64
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    if: inputs.platform == 'linux-aarch64'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rubber-duckie-au/DigitalNote-Builder.git

      - name: Download library source archives
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: bash download.sh

      - name: Install cross-compile toolchain + system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            crossbuild-essential-arm64 \
            qemu-user-static \
            libgmp-dev
          sudo bash ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/update.sh \
            2>/dev/null || true

      - name: Compile static libraries (aarch64 cross-compile)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64
        run: bash compile_libs.sh "-j ${{ env.JOBS }}"

      - name: Package libs tarball
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64
        run: |
          tar -czf ${{ github.workspace }}/libs-linux-aarch64.tar.gz libs/
          echo "Tarball size: $(du -sh ${{ github.workspace }}/libs-linux-aarch64.tar.gz)"
          sha256sum ${{ github.workspace }}/libs-linux-aarch64.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-libs
          name: "Prebuilt Static Libraries"
          files: ${{ github.workspace }}/libs-linux-aarch64.tar.gz
          token: ${{ secrets.PAT_TOKEN }}

# ── macOS x64 (Intel) ─────────────────────────────────────────────────────────
  build-macos-x64:
    name: Build libs — macOS x64 (Intel)
    runs-on: macos-13
