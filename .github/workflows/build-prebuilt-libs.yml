      - name: Download library source archives
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: bash download.sh

      - name: Install Homebrew packages
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: bash update.sh

      - name: Compile static libraries
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: bash compile_libs.sh "-j ${{ env.JOBS }}"

      - name: Package libs tarball
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: |
          tar -czf ${{ github.workspace }}/libs-macos-x64.tar.gz libs/
          echo "Tarball size: $(du -sh ${{ github.workspace }}/libs-macos-x64.tar.gz)"
          sha256sum ${{ github.workspace }}/libs-macos-x64.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-libs
          name: "Prebuilt Static Libraries"
          files: ${{ github.workspace }}/libs-macos-x64.tar.gz
          token: ${{ secrets.PAT_TOKEN }}

# ── macOS arm64 (Apple Silicon) ───────────────────────────────────────────────
  build-macos-arm64:
    name: Build libs — macOS arm64 (Apple Silicon)
    runs-on: macos-14
    timeout-minutes: 240
    if: inputs.platform == 'macos-arm64'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rubber-duckie-au/DigitalNote-Builder.git

      - name: Download library source archives
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: bash download.sh

      - name: Install Homebrew packages
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: bash update.sh

      - name: Compile static libraries
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: bash compile_libs.sh "-j ${{ env.JOBS }}"

      - name: Package libs tarball
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: |
          tar -czf ${{ github.workspace }}/libs-macos-arm64.tar.gz libs/
          echo "Tarball size: $(du -sh ${{ github.workspace }}/libs-macos-arm64.tar.gz)"
          sha256sum ${{ github.workspace }}/libs-macos-arm64.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-libs
          name: "Prebuilt Static Libraries"
          files: ${{ github.workspace }}/libs-macos-arm64.tar.gz
          token: ${{ secrets.PAT_TOKEN }}
