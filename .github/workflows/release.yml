name: Release

on:
  push:
    tags:
      - 'v*.*.*'    # triggers on tags like v2.0.0.7, v2.1.0-rc1

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      # Download all CI artefacts built by prior CI runs on this tag
      - name: Download Linux x64 artefact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-linux-x64
          path: dist/linux-x64
        continue-on-error: true

      - name: Download Linux aarch64 artefact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-linux-aarch64
          path: dist/linux-aarch64
        continue-on-error: true

      - name: Download macOS x64 artefact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-macos-x64
          path: dist/macos-x64
        continue-on-error: true

      - name: Download macOS arm64 artefact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-macos-arm64
          path: dist/macos-arm64
        continue-on-error: true

      - name: Download Windows x64 artefact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-windows-x64
          path: dist/windows-x64
        continue-on-error: true

      - name: Download Windows x86 artefact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-windows-x86
          path: dist/windows-x86
        continue-on-error: true

      # Package each platform into a zip with SHA256 checksum
      - name: Package artefacts
        run: |
          TAG="${{ github.ref_name }}"
          cd dist
          for platform in linux-x64 linux-aarch64 macos-x64 macos-arm64 windows-x64 windows-x86; do
            if [ -d "$platform" ]; then
              ZIP="../digitalnote-${TAG}-${platform}.zip"
              zip -r "$ZIP" "$platform"
              sha256sum "$ZIP" >> ../checksums.txt
              echo "Packaged: digitalnote-${TAG}-${platform}.zip"
            fi
          done
          ls -lh ../*.zip 2>/dev/null || echo "No zip files created"
          cat ../checksums.txt 2>/dev/null || true

      # Auto-generate changelog from git log since last tag
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -30)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES"       >> $GITHUB_OUTPUT
          echo "EOF"            >> $GITHUB_OUTPUT

      # Create the GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DigitalNote XDN ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
          body: |
            ## DigitalNote XDN ${{ github.ref_name }}

            ### Changes since last release
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### What's in this build
            - BIP39 seed phrase support — 24-word recovery phrase linked to wallet encryption
            - Seed phrase unlock — recover wallet access if you forget your password (requires wallet.dat)
            - Async masternode operations — start/stop/startAll/stopAll no longer freeze the GUI
            - Async coin control and send — no more GUI freezes on large wallets
            - Dark theme — proper dark grey (#1e1e1e) background with light grey (#d4d4d4) text
            - Light theme icons used in dark mode — consistent with light theme
            - Status bar — MAINNET label with live block height tooltip
            - Progress bar — expands to fill available space between label and icons
            - Qt deprecated API fixes — `QDateTime(QDate)`, `SystemLocaleShortDate`, etc.

            ### Platform packages
            | Platform | File |
            |---|---|
            | Linux x64 | `digitalnote-${{ github.ref_name }}-linux-x64.zip` |
            | Linux aarch64 | `digitalnote-${{ github.ref_name }}-linux-aarch64.zip` |
            | macOS x64 (Intel) | `digitalnote-${{ github.ref_name }}-macos-x64.zip` |
            | macOS arm64 (Apple Silicon) | `digitalnote-${{ github.ref_name }}-macos-arm64.zip` |
            | Windows x64 | `digitalnote-${{ github.ref_name }}-windows-x64.zip` |
            | Windows x86 | `digitalnote-${{ github.ref_name }}-windows-x86.zip` |

            ### SHA256 Checksums
            ```
            ${{ hashFiles('checksums.txt') }}
            ```

          files: |
            *.zip
            checksums.txt
          token: ${{ secrets.PAT_TOKEN }}
