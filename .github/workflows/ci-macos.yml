name: CI - macOS x64 + arm64

on:
  push:
    branches: [ master, main, develop, 2.0.0.7-testing ]
  pull_request:
    branches: [ master, main, develop, 2.0.0.7-testing ]

env:
  BUILDER_REPO: https://github.com/rubber-duckie-au/DigitalNote-Builder.git
  JOBS: 4

jobs:
  build-macos-x64:
    name: macOS x64 (Intel) — Build + Test
    runs-on: macos-13
    timeout-minutes: 240

    steps:
      - name: Checkout DigitalNote-2
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Cache compiled libraries
        uses: actions/cache@v4
        id: libs-cache
        with:
          path: |
            ${{ github.workspace }}/../DigitalNote-Builder/libs
            ${{ github.workspace }}/../DigitalNote-Builder/download
          key: macos-x64-libs-${{ hashFiles('.gitmodules') }}-v5
          restore-keys: macos-x64-libs-

      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          if [ ! -d DigitalNote-Builder ]; then
            git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rubber-duckie-au/DigitalNote-Builder.git
          else
            cd DigitalNote-Builder && git pull origin master
          fi

      - name: Download library archives
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: bash download.sh

      # Matches macos/x64/update.sh plus cmake (needed by mnemonic.sh)
      - name: Install Homebrew packages
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: |
          bash update.sh
          brew install cmake || true

      # Note: macos compile_libs.sh should include secp256k1, leveldb, mnemonic
      # alongside the existing libs. Qt is built from source here via qt.sh.
      - name: Compile static libraries
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: bash compile_libs.sh "-j ${{ env.JOBS }}"

      - name: Link source tree into Builder
        run: |
          ln -sfn ${{ github.workspace }} \
            ${{ github.workspace }}/../DigitalNote-Builder/DigitalNote-2

      # Matches macos/x64/compile_deamon.sh + USE_BIP39=1
      - name: Compile daemon (digitalnoted)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.daemon.pro \
            USE_UPNP=1 \
            USE_BUILD_INFO=1 \
            USE_BIP39=1 \
            RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-daemon-macos.log
          exit ${PIPESTATUS[0]}

      # Matches macos/x64/compile_app.sh + USE_BIP39=1
      - name: Compile Qt wallet (digitalnote-qt)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.app.pro \
            USE_UPNP=1 \
            USE_QRCODE=1 \
            USE_BUILD_INFO=1 \
            USE_BIP39=1 \
            RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-app-macos.log
          exit ${PIPESTATUS[0]}

      - name: Warning analysis
        if: always()
        run: |
          for log in build-app-macos.log build-daemon-macos.log; do
            if [ -f "${{ github.workspace }}/$log" ]; then
              W=$(grep -c ": warning:" "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              E=$(grep -c ": error:"   "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              echo "=== $log: $W warning(s), $E error(s) ==="
              if [ "$W" -gt 0 ]; then
                grep ": warning:" "${{ github.workspace }}/$log" \
                  | sed 's|.*: warning:||' | sort | uniq -c | sort -rn | head -20
              fi
            fi
          done

      - name: Assert client version 2.0.0.7
        run: |
          DAEMON=$(find ${{ github.workspace }} -name 'digitalnoted' -type f | head -1)
          VERSION_OUT=$("$DAEMON" --version 2>&1 || true)
          echo "Version output: $VERSION_OUT"
          echo "$VERSION_OUT" | grep -q "2\.0\.0\.7" || {
            echo "ERROR: daemon does not report version 2.0.0.7"; exit 1
          }
          echo "OK: client version 2.0.0.7"

      - name: Assert PROTOCOL_VERSION = 62055
        run: |
          grep -qE 'PROTOCOL_VERSION[[:space:]]*=[[:space:]]*62055' src/version.h || {
            echo "ERROR: PROTOCOL_VERSION is not 62055"; grep PROTOCOL src/version.h; exit 1
          }
          echo "OK: PROTOCOL_VERSION = 62055"

      - name: Assert CLIENT_VERSION_BUILD = 7
        run: |
          grep -qE 'CLIENT_VERSION_BUILD[[:space:]]+7' src/clientversion.h || {
            echo "ERROR: CLIENT_VERSION_BUILD is not 7"; exit 1
          }
          echo "OK: CLIENT_VERSION_BUILD = 7"

      - name: Upload macOS x64 artefacts
        uses: actions/upload-artifact@v4
        with:
          name: digitalnote-macos-x64
          path: |
            **/*.app
            **/digitalnoted
          retention-days: 14

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-macos-x64-${{ github.sha }}
          path: |
            ${{ github.workspace }}/build-app-macos.log
            ${{ github.workspace }}/build-daemon-macos.log
          retention-days: 14

  build-macos-arm64:
    name: macOS arm64 (Apple Silicon) — Build + Test
    runs-on: macos-14
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Cache compiled libraries (arm64)
        uses: actions/cache@v4
        id: libs-cache
        with:
          path: |
            ${{ github.workspace }}/../DigitalNote-Builder/libs
            ${{ github.workspace }}/../DigitalNote-Builder/download
          key: macos-arm64-libs-${{ hashFiles('.gitmodules') }}-v5

      - name: Clone Builder + install packages
        run: |
          cd ..
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rubber-duckie-au/DigitalNote-Builder.git \
            2>/dev/null || (cd DigitalNote-Builder && git pull)
          cd DigitalNote-Builder
          bash download.sh 2>/dev/null || true
          cd macos/x64
          bash update.sh
          brew install cmake || true

      - name: Compile static libraries (arm64)
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: bash compile_libs.sh "-j ${{ env.JOBS }}"

      - name: Link source tree
        run: |
          ln -sfn ${{ github.workspace }} \
            ${{ github.workspace }}/../DigitalNote-Builder/DigitalNote-2

      - name: Compile daemon + wallet (arm64)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"

          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.daemon.pro \
            USE_UPNP=1 USE_BUILD_INFO=1 USE_BIP39=1 RELEASE=1
          make -j${{ env.JOBS }}

          rm -rf build Makefile
          qmake DigitalNote.app.pro \
            USE_UPNP=1 USE_QRCODE=1 USE_BUILD_INFO=1 USE_BIP39=1 RELEASE=1
          make -j${{ env.JOBS }}

      - name: Assert version (arm64)
        run: |
          DAEMON=$(find ${{ github.workspace }} -name 'digitalnoted' -type f | head -1)
          "$DAEMON" --version 2>&1 | grep -q "2\.0\.0\.7" || {
            echo "ERROR: arm64 daemon version mismatch"; exit 1
          }
          grep -qE 'PROTOCOL_VERSION[[:space:]]*=[[:space:]]*62055' src/version.h || {
            echo "ERROR: PROTOCOL_VERSION not 62055"; exit 1
          }
          echo "OK: v2.0.0.7 / protocol 62055 on arm64"

      - name: Upload arm64 artefacts
        uses: actions/upload-artifact@v4
        with:
          name: digitalnote-macos-arm64
          path: |
            **/*.app
            **/digitalnoted
          retention-days: 14
