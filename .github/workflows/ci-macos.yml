name: CI - macOS x64 + arm64

on:
  push:
    branches: [ master, main, develop, 2.0.0.7-testing ]
  pull_request:
    branches: [ master, main, develop, 2.0.0.7-testing ]

env:
  BUILDER_REPO: https://github.com/DigitalNoteXDN/DigitalNote-Builder.git
  JOBS: 4

jobs:
  build-macos-x64:
    name: macOS x64 (Intel) — Build + Test
    runs-on: macos-13
    timeout-minutes: 150

    steps:
      - name: Checkout DigitalNote-2
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache compiled libraries
        uses: actions/cache@v4
        id: libs-cache
        with:
          path: |
            ${{ github.workspace }}/../DigitalNote-Builder/libs
            ${{ github.workspace }}/../DigitalNote-Builder/download
          key: macos-x64-libs-${{ hashFiles('.gitmodules') }}-v4
          restore-keys: macos-x64-libs-

      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          if [ ! -d DigitalNote-Builder ]; then
            git clone $BUILDER_REPO DigitalNote-Builder
          else
            cd DigitalNote-Builder && git pull origin master
          fi

      - name: Download library archives
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: bash download.sh

      - name: Install Homebrew packages (Builder update.sh)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: bash update.sh

      - name: Compile static libraries
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: bash compile_libs.sh "-j $JOBS"

      - name: Link source tree into Builder
        run: |
          ln -sfn ${{ github.workspace }} \
            ${{ github.workspace }}/../DigitalNote-Builder/DigitalNote-2

      - name: Compile Qt wallet + daemon
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/x64
        run: |
          bash compile_app.sh    "-j $JOBS"
          bash compile_deamon.sh "-j $JOBS"
          bash deploy.sh

      - name: Assert client version 2.0.0.7
        run: |
          DAEMON=$(find ${{ github.workspace }} -name 'digitalnoted' -type f | head -1)
          VERSION_OUT=$("$DAEMON" --version 2>&1 || true)
          echo "Version output: $VERSION_OUT"
          echo "$VERSION_OUT" | grep -q "2\.0\.0\.7" || {
            echo "ERROR: daemon does not report version 2.0.0.7"; exit 1
          }
          echo "OK: client version 2.0.0.7"

      - name: Assert PROTOCOL_VERSION = 62055
        run: |
          grep -qE 'PROTOCOL_VERSION[[:space:]]*=[[:space:]]*62055' src/version.h || {
            echo "ERROR: PROTOCOL_VERSION is not 62055"; grep PROTOCOL src/version.h; exit 1
          }
          echo "OK: PROTOCOL_VERSION = 62055"

      - name: Assert CLIENT_VERSION_BUILD = 7
        run: |
          grep -qE 'CLIENT_VERSION_BUILD[[:space:]]+7' src/clientversion.h || {
            echo "ERROR: CLIENT_VERSION_BUILD is not 7"; exit 1
          }
          echo "OK: CLIENT_VERSION_BUILD = 7"

      - name: Build and run BIP39 + version unit tests
        run: |
          cmake -S test -B build-test \
                -DCMAKE_BUILD_TYPE=Release \
                -DDIGITALNOTE_SRC_DIR=${{ github.workspace }}/src \
                -DBIP39_INCLUDE_DIR=${{ github.workspace }}/src/bip39/include \
                -DBIP39_SRC_DIR=${{ github.workspace }}/src/bip39/src \
                -DOPENSSL_ROOT_DIR=${{ github.workspace }}/../DigitalNote-Builder/libs/openssl
          cmake --build build-test --parallel $JOBS
          cd build-test && ctest --output-on-failure

      - name: Upload macOS x64 artefacts
        uses: actions/upload-artifact@v4
        with:
          name: digitalnote-macos-x64
          path: |
            **/*.app
            **/digitalnoted
          retention-days: 14

  build-macos-arm64:
    name: macOS arm64 (Apple Silicon) — Build + Test
    runs-on: macos-14
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache compiled libraries (arm64)
        uses: actions/cache@v4
        id: libs-cache
        with:
          path: |
            ${{ github.workspace }}/../DigitalNote-Builder/libs
            ${{ github.workspace }}/../DigitalNote-Builder/download
          key: macos-arm64-libs-${{ hashFiles('.gitmodules') }}-v4

      - name: Clone Builder + install + build
        run: |
          cd ..
          git clone $BUILDER_REPO DigitalNote-Builder 2>/dev/null || \
            (cd DigitalNote-Builder && git pull)
          cd DigitalNote-Builder
          bash download.sh 2>/dev/null || true
          cd macos/x64
          bash update.sh
          if [ "${{ steps.libs-cache.outputs.cache-hit }}" != 'true' ]; then
            bash compile_libs.sh "-j $JOBS"
          fi
          ln -sfn ${{ github.workspace }} \
            ${{ github.workspace }}/../DigitalNote-Builder/DigitalNote-2
          bash compile_app.sh    "-j $JOBS"
          bash compile_deamon.sh "-j $JOBS"
          bash deploy.sh

      - name: Assert version (arm64)
        run: |
          DAEMON=$(find ${{ github.workspace }} -name 'digitalnoted' -type f | head -1)
          $DAEMON --version 2>&1 | grep -q "2\.0\.0\.7" || {
            echo "ERROR: arm64 daemon version mismatch"; exit 1
          }
          grep -qE 'PROTOCOL_VERSION[[:space:]]*=[[:space:]]*62055' src/version.h || {
            echo "ERROR: PROTOCOL_VERSION not 62055"; exit 1
          }
          echo "OK: v2.0.0.7 / protocol 62055 on arm64"

      - name: BIP39 unit tests (arm64)
        run: |
          cmake -S test -B build-test \
                -DCMAKE_BUILD_TYPE=Release \
                -DDIGITALNOTE_SRC_DIR=${{ github.workspace }}/src \
                -DBIP39_INCLUDE_DIR=${{ github.workspace }}/src/bip39/include \
                -DBIP39_SRC_DIR=${{ github.workspace }}/src/bip39/src \
                -DOPENSSL_ROOT_DIR=${{ github.workspace }}/../DigitalNote-Builder/libs/openssl
          cmake --build build-test --parallel $JOBS
          cd build-test && ctest --output-on-failure

      - name: Upload arm64 artefacts
        uses: actions/upload-artifact@v4
        with:
          name: digitalnote-macos-arm64
          path: |
            **/*.app
            **/digitalnoted
          retention-days: 14
