name: CI - Linux x64

on:
  push:
    branches: [ master, main, develop, 2.0.0.7-testing ]
  pull_request:
    branches: [ master, main, develop, 2.0.0.7-testing ]

env:
  BUILDER_REPO: https://github.com/DigitalNoteXDN/DigitalNote-Builder.git
  JOBS: 4

jobs:
  build-and-test-linux-x64:
    name: Linux x64 — Build + Full Test Suite
    runs-on: ubuntu-22.04
    timeout-minutes: 150

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout DigitalNote-2
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Cache libraries ─────────────────────────────────────────────────
      - name: Cache Builder libraries
        uses: actions/cache@v4
        id: libs-cache
        with:
          path: |
            ${{ github.workspace }}/../DigitalNote-Builder/libs
            ${{ github.workspace }}/../DigitalNote-Builder/download
          key: linux-x64-libs-${{ hashFiles('.gitmodules') }}-v4
          restore-keys: linux-x64-libs-

      # ── 3. Clone DigitalNote-Builder ───────────────────────────────────────
      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          if [ ! -d DigitalNote-Builder ]; then
            git clone ${{ env.BUILDER_REPO }} DigitalNote-Builder
          else
            cd DigitalNote-Builder && git pull origin master
          fi

      # ── 4. Download library archives ───────────────────────────────────────
      - name: Download library archives
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: bash download.sh

      # ── 5. Install system packages via Builder ─────────────────────────────
      - name: Install system packages
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: |
          sudo apt-get update -qq
          bash update.sh
          # Additional packages for tests
          sudo apt-get install -y \
            xvfb \
            libboost-test-dev \
            cppcheck \
            valgrind

      # ── 6. Compile static libraries ────────────────────────────────────────
      - name: Compile static libraries
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: bash compile_libs.sh "-j ${{ env.JOBS }}"

      # ── 7. Link source tree ────────────────────────────────────────────────
      - name: Link source tree into Builder
        run: |
          ln -sfn ${{ github.workspace }} \
            ${{ github.workspace }}/../DigitalNote-Builder/DigitalNote-2

      # ── 8. Compile daemon ──────────────────────────────────────────────────
      - name: Compile daemon (digitalnoted)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: bash compile_deamon.sh "-j ${{ env.JOBS }}"

      # ── 9. Compile Qt wallet ───────────────────────────────────────────────
      - name: Compile Qt wallet (digitalnote-qt)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: bash compile_app.sh "-j ${{ env.JOBS }}"

      # ── 10. Verify binaries ────────────────────────────────────────────────
      - name: Verify build artefacts
        run: |
          set -e
          DAEMON=$(find ${{ github.workspace }} -name 'digitalnoted' -type f | head -1)
          WALLET=$(find ${{ github.workspace }} \
                        \( -name 'digitalnote-qt' -o -name 'bitcoin-qt' \) \
                        -type f | head -1)
          echo "Daemon: $DAEMON"
          echo "Wallet: $WALLET"
          [ -x "$DAEMON" ] || { echo "ERROR: daemon not found/executable"; exit 1; }
          [ -x "$WALLET" ] || { echo "ERROR: wallet not found/executable"; exit 1; }

      # ── 11. VERSION ASSERTIONS — verify version bump took effect ──────────
      - name: Assert version numbers baked into binaries
        run: |
          set -e
          DAEMON=$(find ${{ github.workspace }} -name 'digitalnoted' -type f | head -1)

          # 1. Client version 2.0.0.7 in --version output
          VERSION_OUT=$("$DAEMON" --version 2>&1 || true)
          echo "Version output: $VERSION_OUT"
          echo "$VERSION_OUT" | grep -q "2\.0\.0\.7" || {
            echo "ERROR: daemon does not report version 2.0.0.7"
            exit 1
          }
          echo "✓ Client version 2.0.0.7 confirmed"

          # 2. PROTOCOL_VERSION 62055 baked into binary
          strings "$DAEMON" | grep -q "62055" || {
            echo "WARNING: '62055' not found in daemon strings — verify PROTOCOL_VERSION"
          }
          echo "✓ Protocol 62055 check complete"

      # ── 12. Run existing DigitalNote-2 test suite ──────────────────────────
      - name: Run existing test_digitalnote (core unit tests)
        run: |
          # Locate the test binary — built by compile_app.sh or by the daemon
          # build. Convention in Bitcoin-derived repos is src/test/test_bitcoin
          # or test/test_digitalnote.
          TEST_BIN=$(find ${{ github.workspace }} \
                          \( -name 'test_digitalnote' \
                          -o -name 'test_bitcoin' \) \
                          -type f | head -1)

          if [ -z "$TEST_BIN" ]; then
            echo "⚠ test_digitalnote binary not found — building separately"
            cd ${{ github.workspace }}
            # Try building the test suite via qmake if it's a separate target
            qmake "CONFIG+=test" && make -j${{ env.JOBS }} || true
            TEST_BIN=$(find . -name 'test_digitalnote' -o -name 'test_bitcoin' | head -1)
          fi

          if [ -n "$TEST_BIN" ] && [ -x "$TEST_BIN" ]; then
            echo "Running: $TEST_BIN --log_level=test_suite"
            "$TEST_BIN" --log_level=test_suite --report_level=short
          else
            echo "⚠ test_digitalnote binary not available on this build path"
            echo "  This is expected if the project does not have a separate test target."
            echo "  The new src/test/*.cpp files will be compiled and run in the next step."
          fi

      # ── 13. Build & run new tests: version + core ─────────────────────────
      - name: Build standalone test executables (new tests)
        run: |
          set -e
          LIBS_DIR="${{ github.workspace }}/../DigitalNote-Builder/libs"
          SRC="${{ github.workspace }}/src"

          cmake -S ${{ github.workspace }}/test \
                -B ${{ github.workspace }}/build-test \
                -DCMAKE_BUILD_TYPE=Release \
                -DDIGITALNOTE_SRC_DIR="$SRC" \
                -DBIP39_INCLUDE_DIR="$SRC/bip39/include" \
                -DBIP39_SRC_DIR="$SRC/bip39/src" \
                -DOPENSSL_ROOT_DIR="$LIBS_DIR/openssl" \
                -DBOOST_ROOT="$LIBS_DIR/boost"

          cmake --build ${{ github.workspace }}/build-test --parallel ${{ env.JOBS }}

      - name: Run version tests
        run: |
          cd ${{ github.workspace }}/build-test
          ./test_version --log_level=all --report_level=short

      - name: Run BIP39 unit tests
        run: |
          cd ${{ github.workspace }}/build-test
          ./test_bip39_wallet --log_level=all --report_level=short

      - name: Run integration tests (mnemonic/seed vectors)
        run: |
          cd ${{ github.workspace }}/build-test
          ./test_integration --log_level=all --report_level=short

      # ── 14. Run Qt tests (headless) ────────────────────────────────────────
      - name: Run Qt GUI tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd ${{ github.workspace }}/build-test
          # Qt test binaries use -v2 for verbose output
          if [ -f ./test_seedphrasedialog ]; then
            ./test_seedphrasedialog -v2
          fi
          if [ -f ./test_walletmodel ]; then
            ./test_walletmodel -v2
          fi

      # ── 15. Static analysis ────────────────────────────────────────────────
      - name: cppcheck — new Qt/BIP39 sources
        run: |
          cppcheck \
            --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            --std=c++17 \
            -I ${{ github.workspace }}/src/bip39/include \
            -I ${{ github.workspace }}/src \
            ${{ github.workspace }}/src/qt/seedphrasedialog.cpp \
            ${{ github.workspace }}/src/qt/coincontrolworker.cpp \
            ${{ github.workspace }}/src/qt/sendcoinsworker.cpp \
            ${{ github.workspace }}/src/bip39/src/bip39_wallet.cpp \
            2>&1 || echo "⚠ cppcheck warnings present (non-fatal for new code)"

      - name: cppcheck — new test files
        run: |
          cppcheck \
            --enable=warning,style \
            --suppress=missingIncludeSystem \
            --std=c++17 \
            -I ${{ github.workspace }}/src \
            -I ${{ github.workspace }}/src/bip39/include \
            ${{ github.workspace }}/src/test/version_tests.cpp \
            ${{ github.workspace }}/src/test/amount_tests.cpp \
            ${{ github.workspace }}/src/test/hash_tests.cpp \
            ${{ github.workspace }}/src/test/key_tests.cpp \
            ${{ github.workspace }}/src/test/script_tests.cpp \
            ${{ github.workspace }}/src/test/spork_tests.cpp \
            ${{ github.workspace }}/src/test/util_tests.cpp \
            ${{ github.workspace }}/src/test/transaction_tests.cpp \
            2>&1 || echo "⚠ cppcheck warnings in test files (non-fatal)"

      # ── 16. Upload artefacts ───────────────────────────────────────────────
      - name: Upload Linux x64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: digitalnote-linux-x64
          path: |
            **/digitalnoted
            **/digitalnote-qt
            **/bitcoin-qt
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test binaries & results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-linux-x64
          path: |
            **/build-test/test_*
            **/Testing/
          retention-days: 7

  # ── Lint-only job ──────────────────────────────────────────────────────────
  lint:
    name: Lint (cppcheck + formatting check)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: cppcheck full src/qt tree
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --std=c++17 \
            -I src \
            -I src/bip39/include \
            src/qt/ \
            2>&1 | tee cppcheck-qt.log
          # Show summary
          echo "--- cppcheck summary ---"
          grep -c "error\|warning\|style\|performance" cppcheck-qt.log || echo "0 issues"

      - name: Check clientversion.h is updated to 2.0.0.7
        run: |
          grep -q "CLIENT_VERSION_BUILD.*7" src/clientversion.h || {
            echo "ERROR: CLIENT_VERSION_BUILD is not 7 in src/clientversion.h"
            echo "Expected: #define CLIENT_VERSION_BUILD 7"
            exit 1
          }
          echo "✓ CLIENT_VERSION_BUILD = 7 confirmed"

      - name: Check version.h PROTOCOL_VERSION is 62055
        run: |
          grep -qE 'PROTOCOL_VERSION[[:space:]]*=[[:space:]]*62055' src/version.h || {
            echo "ERROR: PROTOCOL_VERSION is not 62055 in src/version.h"
            grep 'PROTOCOL_VERSION' src/version.h || true
            exit 1
          }
          echo "✓ PROTOCOL_VERSION = 62055 confirmed"

      - name: Check version.h MIN_PEER_PROTO_VERSION is 62052
        run: |
          grep -qE 'MIN_PEER_PROTO_VERSION[[:space:]]*=[[:space:]]*62052' src/version.h || {
            echo "ERROR: MIN_PEER_PROTO_VERSION is not 62052"
            exit 1
          }
          echo "✓ MIN_PEER_PROTO_VERSION = 62052 confirmed"

      - name: Check no dark theme references remain
        run: |
          HITS=$(grep -rn \
            "darkMode\|dark_theme\|USE_DARK_THEME\|fDarkTheme\|applyDark" \
            src/qt/ 2>/dev/null | grep -v "//.*darkMode" | wc -l)
          echo "Dark theme references found: $HITS"
          if [ "$HITS" -gt 0 ]; then
            echo "WARNING: Dark theme references still present — run patch 1 to remove them"
            grep -rn "darkMode\|dark_theme\|USE_DARK_THEME\|fDarkTheme\|applyDark" src/qt/ || true
          fi
