name: CI - Linux x64

on:
  push:
    branches: [ master, main, develop, 2.0.0.7-testing ]
  pull_request:
    branches: [ master, main, develop, 2.0.0.7-testing ]
  workflow_call:  # allow release.yml to call this workflow

env:
  BUILDER_REPO: https://github.com/rubber-duckie-au/DigitalNote-Builder.git
  JOBS: 4

jobs:
  build-and-test-linux-x64:
    name: Linux x64 — Build + Full Test Suite
    runs-on: ubuntu-22.04
    # Qt builds from source inside compile_libs.sh — allow up to 3 hours
    timeout-minutes: 240

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout DigitalNote-2
        uses: actions/checkout@v4
        with:
          submodules: false  # BIP39 merged into main repo - no longer a submodule
          token: ${{ secrets.PAT_TOKEN }}

      # ── 2. Cache libraries ─────────────────────────────────────────────────
      - name: Cache Builder libraries
        uses: actions/cache@v4
        id: libs-cache
        with:
          path: |
            ${{ github.workspace }}/../DigitalNote-Builder/libs
            ${{ github.workspace }}/../DigitalNote-Builder/download
          key: linux-x64-libs-${{ hashFiles('.gitmodules') }}-v5
          restore-keys: linux-x64-libs-

      # ── 3. Clone DigitalNote-Builder ───────────────────────────────────────
      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          if [ ! -d DigitalNote-Builder ]; then
            git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rubber-duckie-au/DigitalNote-Builder.git
          else
            cd DigitalNote-Builder && git pull origin master
          fi

      # ── 4. Download library archives ───────────────────────────────────────
      - name: Download library archives
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: bash download.sh

      # ── 5. Install system packages ─────────────────────────────────────────
      # Matches linux/x64/update.sh plus extras needed for:
      #   cmake        — no longer required for BIP39 (now compiled via bip39.pri)
      #   libgmp-dev   — GMP library (gmp.sh checks for this on Linux)
      #   xvfb         — headless display for Qt GUI tests
      - name: Install system packages
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: |
          sudo apt-get update -qq
          bash update.sh
          sudo apt-get install -y \
            cmake \
            libgmp-dev \
            xvfb \
            libboost-test-dev \
            cppcheck \
            valgrind

      # ── 6. Compile static libraries ────────────────────────────────────────
      # Note: linux/x64/compile_libs.sh calls qt.sh last — Qt is built from
      # source here. The libs cache prevents rebuilding on every run.
      # compile_libs.sh passes $1 as the jobs arg to each sub-script.
      # secp256k1 and leveldb are built from DigitalNote-2 source.
      # BIP39 is now compiled directly into the wallet via bip39.pri
      - name: Compile static libraries
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: bash compile_libs.sh "-j ${{ env.JOBS }}"

      # ── 7. Link source tree ────────────────────────────────────────────────
      - name: Link source tree into Builder
        run: |
          ln -sfn ${{ github.workspace }} \
            ${{ github.workspace }}/../DigitalNote-Builder/DigitalNote-2

      # ── 8. Compile daemon ──────────────────────────────────────────────────
      # USE_BIP39=1 enables the BIP39 mnemonic seed phrase feature
      - name: Compile daemon (digitalnoted)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.daemon.pro \
            USE_UPNP=1 \
            USE_BUILD_INFO=1 \
            USE_BIP39=1 \
            RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-daemon.log
          exit ${PIPESTATUS[0]}

      # ── 9. Compile Qt wallet ───────────────────────────────────────────────
      # USE_BIP39=1 — BIP39 seed phrase support
      # USE_DBUS=1  — system tray notifications on Linux
      - name: Compile Qt wallet (digitalnote-qt)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/x64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.app.pro \
            USE_UPNP=1 \
            USE_DBUS=1 \
            USE_QRCODE=1 \
            USE_BUILD_INFO=1 \
            USE_BIP39=1 \
            RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-app.log
          exit ${PIPESTATUS[0]}

      # ── 10. Warning analysis ───────────────────────────────────────────────
      - name: Analyse build warnings
        if: always()
        run: |
          for log in build-app.log build-daemon.log; do
            if [ -f "${{ github.workspace }}/$log" ]; then
              W=$(grep -c ": warning:" "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              E=$(grep -c ": error:"   "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              echo "=== $log: $W warning(s), $E error(s) ==="
              if [ "$W" -gt 0 ]; then
                grep ": warning:" "${{ github.workspace }}/$log" \
                  | sed 's|.*: warning:||' | sort | uniq -c | sort -rn | head -20
              fi
            fi
          done

      # ── 11. Verify binaries ────────────────────────────────────────────────
      - name: Verify build artefacts
        run: |
          set -e
          DAEMON=$(find ${{ github.workspace }} -name 'digitalnoted' -type f | head -1)
          WALLET=$(find ${{ github.workspace }} \
                        \( -name 'digitalnote-qt' -o -name 'bitcoin-qt' \) \
                        -type f | head -1)
          echo "Daemon: $DAEMON"
          echo "Wallet: $WALLET"
          [ -x "$DAEMON" ] || { echo "ERROR: daemon not found/executable"; exit 1; }
          [ -x "$WALLET" ] || { echo "ERROR: wallet not found/executable"; exit 1; }

      # ── 12. Version assertions ─────────────────────────────────────────────
      - name: Assert version numbers baked into binaries
        run: |
          set -e
          DAEMON=$(find ${{ github.workspace }} -name 'digitalnoted' -type f | head -1)
          VERSION_OUT=$("$DAEMON" --version 2>&1 || true)
          echo "Version output: $VERSION_OUT"
          echo "$VERSION_OUT" | grep -q "2\.0\.0\.7" || {
            echo "ERROR: daemon does not report version 2.0.0.7"
            exit 1
          }
          echo "✓ Client version 2.0.0.7 confirmed"
          strings "$DAEMON" | grep -q "62055" || \
            echo "WARNING: '62055' not found in daemon strings — verify PROTOCOL_VERSION"
          echo "✓ Protocol 62055 check complete"

      # ── 13. Run existing test suite ────────────────────────────────────────
      - name: Run existing test_digitalnote (core unit tests)
        run: |
          TEST_BIN=$(find ${{ github.workspace }} \
                          \( -name 'test_digitalnote' \
                          -o -name 'test_bitcoin' \) \
                          -type f | head -1)
          if [ -n "$TEST_BIN" ] && [ -x "$TEST_BIN" ]; then
            echo "Running: $TEST_BIN"
            "$TEST_BIN" --log_level=test_suite --report_level=short
          else
            echo "⚠ test_digitalnote binary not available on this build path"
          fi

      # ── 14. Static analysis ────────────────────────────────────────────────
      - name: cppcheck — new Qt/BIP39 sources
        run: |
          cppcheck \
            --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=0 \
            --std=c++17 \
            -I ${{ github.workspace }}/src/bip39/include \
            -I ${{ github.workspace }}/src \
            ${{ github.workspace }}/src/qt/seedphrasedialog.cpp \
            ${{ github.workspace }}/src/qt/coincontrolworker.cpp \
            ${{ github.workspace }}/src/qt/sendcoinsworker.cpp \
            ${{ github.workspace }}/src/qt/masternodeworker.cpp \
            ${{ github.workspace }}/src/qt/decryptworker.cpp \
            ${{ github.workspace }}/src/qt/walletmodel.cpp \
            ${{ github.workspace }}/src/qt/askpassphrasedialog.cpp \
            ${{ github.workspace }}/src/bip39/src/bip39_wallet.cpp \
            ${{ github.workspace }}/src/bip39/src/bip39_passphrase.cpp \
            ${{ github.workspace }}/src/rpcbip39.cpp \
            2>&1 || echo "⚠ cppcheck warnings present (non-fatal)"

      # ── 15. Upload artefacts ───────────────────────────────────────────────
      - name: Upload Linux x64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: digitalnote-linux-x64
          path: |
            **/digitalnoted
            **/digitalnote-qt
            **/bitcoin-qt
          if-no-files-found: warn
          retention-days: 14

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-linux-x64-${{ github.sha }}
          path: |
            ${{ github.workspace }}/build-app.log
            ${{ github.workspace }}/build-daemon.log
          retention-days: 14

  # ── Lint-only job ──────────────────────────────────────────────────────────
  lint:
    name: Lint (cppcheck + version checks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false  # BIP39 merged into main repo - no longer a submodule
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: cppcheck full src/qt tree
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --std=c++17 \
            -I src \
            -I src/bip39/include \
            src/qt/ \
            2>&1 | tee cppcheck-qt.log
          echo "--- cppcheck summary ---"
          grep -c "error\|warning\|style\|performance" cppcheck-qt.log || echo "0 issues"

      - name: Check clientversion.h is updated to 2.0.0.7
        run: |
          grep -q "CLIENT_VERSION_BUILD.*7" src/clientversion.h || {
            echo "ERROR: CLIENT_VERSION_BUILD is not 7 in src/clientversion.h"
            exit 1
          }
          echo "✓ CLIENT_VERSION_BUILD = 7 confirmed"

      - name: Check PROTOCOL_VERSION is 62055
        run: |
          grep -qE 'PROTOCOL_VERSION[[:space:]]*=[[:space:]]*62055' src/version.h || {
            echo "ERROR: PROTOCOL_VERSION is not 62055 in src/version.h"
            grep 'PROTOCOL_VERSION' src/version.h || true
            exit 1
          }
          echo "✓ PROTOCOL_VERSION = 62055 confirmed"

      - name: Check MIN_PEER_PROTO_VERSION is 62052
        run: |
          grep -qE 'MIN_PEER_PROTO_VERSION[[:space:]]*=[[:space:]]*62052' src/version.h || {
            echo "ERROR: MIN_PEER_PROTO_VERSION is not 62052"
            exit 1
          }
          echo "✓ MIN_PEER_PROTO_VERSION = 62052 confirmed"
