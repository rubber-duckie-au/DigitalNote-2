name: CI - Linux aarch64

on:
  push:
    branches: [ master, main, develop, 2.0.0.7-testing ]
  pull_request:
    branches: [ master, main, develop, 2.0.0.7-testing ]

env:
  BUILDER_REPO: https://github.com/DigitalNoteXDN/DigitalNote-Builder.git
  JOBS: 4

jobs:
  build-linux-aarch64:
    name: Linux aarch64 — Build + Version Check
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Cache compiled libraries
        uses: actions/cache@v4
        id: libs-cache
        with:
          path: |
            ${{ github.workspace }}/../DigitalNote-Builder/libs
            ${{ github.workspace }}/../DigitalNote-Builder/download
          key: linux-aarch64-libs-${{ hashFiles('.gitmodules') }}-${{ hashFiles('../DigitalNote-Builder/compile/*.sh') }}-v5

      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/DigitalNoteXDN/DigitalNote-Builder.git \
            2>/dev/null || (cd DigitalNote-Builder && git pull)

      - name: Download library archives
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: bash download.sh

      # Matches linux/aarch64/update.sh plus cmake (needed by mnemonic.sh)
      # and libgmp-dev (needed by gmp.sh on Linux)
      - name: Install cross-compile toolchain + system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            crossbuild-essential-arm64 \
            qemu-user-static \
            cmake \
            libgmp-dev \
            libboost-test-dev
          sudo bash ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/update.sh \
            2>/dev/null || true

      # Note: aarch64 compile_libs.sh should include secp256k1, leveldb, mnemonic
      # just like the x64 version. These are built from git submodules.
      - name: Compile static libraries (aarch64)
        if: steps.libs-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64
        run: bash compile_libs.sh "-j ${{ env.JOBS }}"

      - name: Link source tree
        run: |
          ln -sfn ${{ github.workspace }} \
            ${{ github.workspace }}/../DigitalNote-Builder/DigitalNote-2

      # Matches linux/aarch64/compile_deamon.sh + USE_BIP39=1
      - name: Compile daemon (aarch64)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.daemon.pro \
            USE_UPNP=1 \
            USE_BUILD_INFO=1 \
            USE_BIP39=1 \
            RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-daemon-aarch64.log
          exit ${PIPESTATUS[0]}

      # Matches linux/aarch64/compile_app.sh + USE_BIP39=1
      - name: Compile Qt wallet (aarch64)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.app.pro \
            USE_UPNP=1 \
            USE_DBUS=1 \
            USE_QRCODE=1 \
            USE_BUILD_INFO=1 \
            USE_BIP39=1 \
            RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-app-aarch64.log
          exit ${PIPESTATUS[0]}

      # Version assertions on source — binary is aarch64 so cannot run on x86 host
      - name: Assert version constants in source
        run: |
          grep -qE 'CLIENT_VERSION_BUILD[[:space:]]+7' src/clientversion.h || {
            echo "ERROR: CLIENT_VERSION_BUILD is not 7"; exit 1
          }
          grep -qE 'PROTOCOL_VERSION[[:space:]]*=[[:space:]]*62055' src/version.h || {
            echo "ERROR: PROTOCOL_VERSION is not 62055"; exit 1
          }
          grep -qE 'MIN_PEER_PROTO_VERSION[[:space:]]*=[[:space:]]*62052' src/version.h || {
            echo "ERROR: MIN_PEER_PROTO_VERSION is not 62052"; exit 1
          }
          echo "OK: clientversion.h BUILD=7, version.h PROTOCOL=62055"

      - name: Warning analysis
        if: always()
        run: |
          for log in build-app-aarch64.log build-daemon-aarch64.log; do
            if [ -f "${{ github.workspace }}/$log" ]; then
              W=$(grep -c ": warning:" "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              E=$(grep -c ": error:"   "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              echo "=== $log: $W warning(s), $E error(s) ==="
            fi
          done

      - name: Upload aarch64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: digitalnote-linux-aarch64
          path: |
            **/digitalnoted
            **/digitalnote-qt
            **/bitcoin-qt
          retention-days: 14

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-linux-aarch64-${{ github.sha }}
          path: |
            ${{ github.workspace }}/build-app-aarch64.log
            ${{ github.workspace }}/build-daemon-aarch64.log
          retention-days: 14
